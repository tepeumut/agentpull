name: publish

on:
  push:
    tags: ['v*']

# Don't double-publish if the same tag is somehow re-pushed. We do not cancel
# in-progress runs because a half-published release is worse than a stalled one.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-version:
    name: Verify tag matches package.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assert tag == package.json version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG=$(node -p "require('./package.json').version")
          EXPECTED="v${PKG}"
          if [[ "$TAG" != "$EXPECTED" ]]; then
            echo "::error::Tag $TAG does not match package.json version $PKG (expected $EXPECTED)."
            echo "Recovery: git tag -d $TAG && git push origin :refs/tags/$TAG"
            exit 1
          fi
          echo "OK: $TAG matches package.json $PKG"

  test:
    name: Test matrix
    needs: verify-version
    uses: ./.github/workflows/test.yml

  publish:
    name: Publish to npm + GitHub Release
    needs: [verify-version, test]
    runs-on: ubuntu-latest
    permissions:
      # OIDC for npm Trusted Publisher — no NPM_TOKEN secret required.
      id-token: write
      # Required for the GitHub Release creation step.
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted Publisher OIDC token exchange requires npm >= 11.5.1.
      # Node 22 ships with npm 10.x, which silently publishes unauthenticated
      # and fails with a 404 on first publish. Upgrade before `npm ci` so the
      # lockfile install also runs on the new npm.
      - name: Upgrade npm for OIDC Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm (OIDC + provenance)
        # No NODE_AUTH_TOKEN — Trusted Publisher uses the OIDC token
        # automatically when `id-token: write` is set and the package is
        # configured on npmjs.com → Settings → Trusted Publisher.
        run: npm publish --provenance --access public

      - name: Pack tarball for GitHub Release
        id: pack
        run: |
          FILE=$(npm pack --silent)
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

      - name: Detect prerelease
        id: pre
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ -(rc|beta|alpha) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ steps.pre.outputs.prerelease == 'true' }}
          draft: false
          files: ${{ steps.pack.outputs.file }}
